<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Hard Commerce Lab</title>
  <meta name="description" content="An internal commerce training storefront for delightfully questionable office supplies">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link id="favicon" rel="icon" type="image/svg+xml" href="assets/public/favicon-alt.svg">

    window.addEventListener("load", function(){
      window.cookieconsent.initialise({
        "palette": {
          "popup": { "background": "var(--theme-primary)", "text": "var(--theme-text)" },
          "button": { "background": "var(--theme-accent)", "text": "var(--theme-text)" }

        "theme": "classic",
        "position": "bottom-right",

  </script>
